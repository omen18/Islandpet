# project.yml — XcodeGen spec for IslandPet
# Install xcodegen: brew install xcodegen
# Generate the project: xcodegen generate
# Then open IslandPet.xcodeproj in Xcode.

name: IslandPet
options:
  bundleIdPrefix: com.islandpet
  deploymentTarget:
    iOS: "17.0"
  developmentLanguage: en
  createIntermediateGroups: true
  groupSortPosition: top
  generateEmptyDirectories: true

settings:
  base:
    SWIFT_VERSION: "5.10"
    IPHONEOS_DEPLOYMENT_TARGET: "17.0"
    ENABLE_USER_SCRIPT_SANDBOXING: YES
    GENERATE_INFOPLIST_FILE: NO
    DEVELOPMENT_TEAM: ""               # ← Fill with your Apple Developer Team ID
    CODE_SIGN_STYLE: Automatic
    SWIFT_STRICT_CONCURRENCY: minimal
    CLANG_ENABLE_MODULES: YES
    SWIFT_EMIT_LOC_STRINGS: YES

# Optional package dependency for Rive. Uncomment when you're ready to integrate.
# packages:
#   RiveRuntime:
#     url: https://github.com/rive-app/rive-ios
#     from: 6.0.0

targets:

  # ─────────────────────────────────────────────────────────────
  # Main App
  # ─────────────────────────────────────────────────────────────
  IslandPet:
    type: application
    platform: iOS
    sources:
      - path: IslandPet
        excludes:
          - "Resources/Info.plist"
          - "Resources/IslandPet.entitlements"
      - path: Shared
    resources:
      - path: IslandPet/Resources/Assets.xcassets
        optional: true
      - path: IslandPet/Resources/Animations
        optional: true
    info:
      path: IslandPet/Resources/Info.plist
    entitlements:
      path: IslandPet/Resources/IslandPet.entitlements
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.islandpet.app
        PRODUCT_NAME: IslandPet
        INFOPLIST_FILE: IslandPet/Resources/Info.plist
        CODE_SIGN_ENTITLEMENTS: IslandPet/Resources/IslandPet.entitlements
        TARGETED_DEVICE_FAMILY: "1,2"        # iPhone + iPad
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        CURRENT_PROJECT_VERSION: 1
        MARKETING_VERSION: 1.0.0
        SUPPORTS_MACCATALYST: NO
    dependencies:
      - target: IslandPetWidgetExtension
      # Uncomment when adding Rive:
      # - package: RiveRuntime

  # ─────────────────────────────────────────────────────────────
  # Widget Extension (Lock Screen widgets + Live Activity)
  # ─────────────────────────────────────────────────────────────
  IslandPetWidgetExtension:
    type: app-extension
    platform: iOS
    sources:
      - path: IslandPetWidget
        excludes:
          - "Info.plist"
          - "IslandPetWidget.entitlements"
      # PetActivityAttributes.swift is shared with the app target.
      - path: Shared
    info:
      path: IslandPetWidget/Info.plist
    entitlements:
      path: IslandPetWidget/IslandPetWidget.entitlements
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.islandpet.app.widget
        PRODUCT_NAME: IslandPetWidgetExtension
        INFOPLIST_FILE: IslandPetWidget/Info.plist
        CODE_SIGN_ENTITLEMENTS: IslandPetWidget/IslandPetWidget.entitlements
        TARGETED_DEVICE_FAMILY: "1,2"
        SKIP_INSTALL: YES
        CURRENT_PROJECT_VERSION: 1
        MARKETING_VERSION: 1.0.0

schemes:
  IslandPet:
    build:
      targets:
        IslandPet: all
        IslandPetWidgetExtension: [run, profile, archive]
    run:
      config: Debug
    test:
      config: Debug
    profile:
      config: Release
    analyze:
      config: Debug
    archive:
      config: Release
